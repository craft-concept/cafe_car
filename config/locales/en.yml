en:
  "true": "Yes"
  "false": "No"
  index: List
  show: View
  destroy: Delete
  new_session: Log In
  auth_required: Please %{new_session} first.

  navigation:
    icon:
      new_session: log-in
      dashboard: dashboard
      sessions: log-in
      attachments: media-image-list
      blobs: media-image-folder
      passwords: key
      versions: multiple-pages

  helpers:
    bulk_confirm: "Apply “%{action}” to the selected rows?"

  # Button style (a Button component flag) per bulk action — a shipped default a
  # host can extend/override. Unlisted actions fall back to the neutral style.
  bulk_actions:
    styles:
      destroy: danger

  dashboard:
    no_date_column: No date column to chart.

  # Index "chart" view controls. The y-metric labels interpolate the chartable
  # column's own attribute name (e.g. "Sum of Total").
  chart:
    no_columns: No date columns to chart.
    update: Update
    metric:
      count: Count
      sum: "Sum of %{attribute}"
      avg: "Average %{attribute}"

  list_html:
    zero: "(none)"
    one: "%{list}"
    other: "%{count} total: %{list}"

  controls:
    default: "%{Action}"
    new: "%{Action} %{Model}"
    index: "%{Models}"
    confirm:
      destroy: This %{Model} will be PERMANENTLY deleted. Are you sure?
    disabled:
      policy:
        default: You don't have permission to %{action} this %{model}.
        index: You don't have permission to %{action} %{models}.

  time:
    formats:
      default: "%b %{ordinal}, %Y at %-l:%M%p"
      long: "%A, %B %{ordinal}, %Y at %-l:%M:%S%p %Z"

  attributes:
    to_s: Item
    id: ID
    ip: IP
    ip_address: IP address
    created_at: Created
    updated_at: Updated
    deleted_at: Deleted
    published_at: Published

  flashes:
    create_html: "%{Model} created."
    update_html: "%{Model} updated."
    destroy_html: "%{Model} deleted."

  activerecord:
    models:
      application_record: Record # .model_name.human
      person:
        one: Person
        other: People
    attributes:
      article:
        title: Title # .human_attribute_name("title")
