# Release cafe_car to RubyGems via Trusted Publishing (OIDC, keyless — no secrets).
#
# Requirements:
#   1. A RubyGems trusted-publisher registration for this gem pointing at
#      repo craft-concept/cafe_car, workflow release.yml, environment "release".
#      (rubygems.org -> gem -> Trusted Publishers -> Create.)
#   2. A GitHub Environment named "release" with a required reviewer, so the
#      publish job blocks on owner approval before it runs.
#
# Pushing a tag like vX.Y.Z triggers this workflow; it then waits for the
# "release" environment approval before building and pushing the gem.
#
# When cutting a release: bump lib/cafe_car/version.rb AND regenerate Gemfile.lock
# in the SAME commit (run `bundle install` after the bump). The version bump changes
# this path gem's gemspec, and CI/this workflow run bundler in frozen mode — a stale
# Gemfile.lock (still pinning the old version) aborts with "gemspecs for path gems
# changed, but the lockfile can't be updated because frozen mode is set".

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # OIDC token for RubyGems trusted publishing
      contents: write   # create the GitHub release
    steps:
      # The full check suite boots the dummy app and exercises its image stack;
      # ruby-vips needs the system libvips library just as it does in CI's test job.
      - name: Install packages
        run:
          sudo apt-get update && sudo apt-get install --no-install-recommends -y
          libvips

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify version.rb matches the pushed tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          gem_version="$(ruby -e 'require_relative "lib/cafe_car/version"; puts CafeCar::VERSION')"
          if [ "$tag" != "$gem_version" ]; then
            echo "Tag ($tag) does not match lib/cafe_car/version.rb ($gem_version)" >&2
            exit 1
          fi

      - name: Verify the tagged commit is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit ($GITHUB_SHA) is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Run full checks
        run: bundle exec rake

      - uses: rubygems/release-gem@v1

      # rubygems/release-gem only publishes to RubyGems; it does not create the
      # GitHub release object. Do that here from the pushed tag, with notes pulled
      # from the matching CHANGELOG.md section. Idempotent: edits an existing
      # release instead of failing, so re-runs and the manual fallback still work.
      - name: Create or update the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { grab = 1; next }
            grab && /^## \[/       { exit }
            grab                   { print }
          ' CHANGELOG.md > release-notes.md
          sed -i '/./,$!d' release-notes.md   # drop leading blank lines
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md --latest --verify-tag
          fi
