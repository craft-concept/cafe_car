name: Bug report
description: Report something in CafeCar that isn't working as documented.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please check the
        [README](../../blob/main/README.md) and existing issues first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the full error/stack trace if any.
      placeholder: When I generate a resource and visit /products, I get a 500…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a link to a minimal reproduction repo) that trigger the bug.
      placeholder: |
        1. `rails generate cafe_car:resource Product name:string`
        2. `rails db:migrate`
        3. Visit `/products`
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: CafeCar / Rails / Ruby versions
      description: Output of `bundle show cafe_car rails` and `ruby -v`.
      placeholder: "cafe_car 0.1.2, rails 8.1.3, ruby 3.3.5"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Relevant policy/controller/model code, logs, or screenshots.
    validations:
      required: false
